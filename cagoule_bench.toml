# cagoule_bench.toml — Configuration cagoule-bench v2.0.0
# Placer à la racine du projet ou dans le répertoire de travail.
# Alternative : [tool.cagoule-bench] dans pyproject.toml

# ── Paramètres d'exécution ───────────────────────────────────────────────────
iterations = 500          # Itérations par benchmark (défaut: 500)
warmup     = 10           # Warmup avant mesure (défaut: 10)

# Suites à lancer par défaut (null = toutes sauf avx2 qui est opt-in)
# suites = ["encryption", "kdf", "memory", "parallel"]

# ── Formats de sortie ────────────────────────────────────────────────────────
formats    = ["console", "json"]  # console, json, csv, md, html
output_dir = "./benchmark_results"

# ── Tailles de message pour la suite encryption/streaming ────────────────────
# sizes = [1024, 8192, 65536, 1048576, 10485760]  # bytes (défaut)

# ── Paramètres KDF ───────────────────────────────────────────────────────────
# kdf_time_costs    = [1, 3, 5]          # Argon2id t_cost
# kdf_memory_costs  = [16384, 65536, 131072]  # Argon2id m_cost (KiB)
# kdf_parallelism   = [1, 2, 4]          # Argon2id parallelism

# ── Historique SQLite ────────────────────────────────────────────────────────
db_path = ".cagoule_bench/history.db"

# ── Régression ───────────────────────────────────────────────────────────────
regression_threshold = -5.0  # % de baisse toléré avant alerte CI
